<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Semester Attendance Tracker</h1>
        <p>Banasthali Vidyapith | IT Department</p>

        <div class="dashboard">
            <div class="stats-card">
                <canvas id="attendanceChart"></canvas>
                <h2 id="percentageText">0%</h2>
            </div>

            <div class="log-card">
                <h3>Daily Log</h3>
                <div id="dateList" class="date-grid">
                    </div>
                <button onclick="saveToLocal()">Save Changes</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
